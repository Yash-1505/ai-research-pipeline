name: AI Research Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 0 * * 6'
    - cron: '0 0 5 * *'
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Manual Trigger Frequency'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-genai

      - name: Determine Frequency
        id: freq
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.frequency }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" == "05" ]; then
            echo "type=monthly" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" == "6" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
          else
            echo "type=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run Research Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEARCH_FREQUENCY: ${{ steps.freq.outputs.type }}
        run: python scripts/research_agent.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add archive/
          git commit -m "Archive: ${{ steps.freq.outputs.type }} update $(date +'%Y-%m-%d')" || exit 0
          git push
